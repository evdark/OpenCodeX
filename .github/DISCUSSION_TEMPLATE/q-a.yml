title: "Q&A: "
labels:
  - question
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you need help with?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add configuration, commands, screenshots, or logs if useful. Remove secrets first.
    validations:
      required: false
