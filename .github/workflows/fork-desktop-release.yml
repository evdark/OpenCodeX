name: fork desktop release
run-name: "desktop release v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
        type: string
      publish:
        description: "Publish the release after assets upload"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark a newly-created release as a prerelease"
        required: false
        default: false
        type: boolean

concurrency: ${{ github.workflow }}-${{ inputs.version }}

permissions:
  contents: write

jobs:
  version:
    if: github.repository != 'anomalyco/opencode'
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}
      repo: ${{ steps.version.outputs.repo }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          version="${version#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $version" >&2
            exit 1
          fi

          tag="v${version}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Using existing release $tag"
          else
            args=(release create "$tag" --draft --target "$GITHUB_SHA" --title "$tag" --notes "Desktop installers for $tag.")
            if [[ "$PRERELEASE" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh "${args[@]}" --repo "$GITHUB_REPOSITORY"
          fi

          release="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json databaseId --jq .databaseId)"
          {
            echo "version=$version"
            echo "release=$release"
            echo "tag=$tag"
            echo "repo=$GITHUB_REPOSITORY"
          } >> "$GITHUB_OUTPUT"

  build-desktop:
    needs: version
    if: github.repository != 'anomalyco/opencode'
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-15-intel
            target: x86_64-apple-darwin
            platform_flag: --mac --x64
            bun_install_flags: --os=darwin --cpu=x64
          - host: macos-15
            target: aarch64-apple-darwin
            platform_flag: --mac --arm64
            bun_install_flags: --os=darwin --cpu=arm64
          - host: windows-2025
            target: x86_64-pc-windows-msvc
            platform_flag: --win --x64
          - host: windows-2025
            target: aarch64-pc-windows-msvc
            platform_flag: --win --arm64
          - host: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform_flag: --linux --x64
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform_flag: --linux --arm64
    runs-on: ${{ matrix.settings.host }}
    env:
      HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && 'true' || 'false' }}
      HAS_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_PATH != '' && secrets.APPLE_API_KEY != '' && secrets.APPLE_API_ISSUER != '' && 'true' || 'false' }}
      HAS_AZURE_SIGNING: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' && secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME != '' && secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE != '' && secrets.AZURE_TRUSTED_SIGNING_ENDPOINT != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - uses: apple-actions/import-codesign-certs@8f3fb608891dd2244cdab3d69cd68c0d37a7fe93 # v2.0.0
        if: runner.os == 'macOS' && env.HAS_APPLE_CERTIFICATE == 'true'
        with:
          keychain: build
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Setup Apple API Key
        if: runner.os == 'macOS' && env.HAS_APPLE_API_KEY == 'true'
        shell: bash
        run: echo "${{ secrets.APPLE_API_KEY_PATH }}" > "$RUNNER_TEMP/apple-api-key.p8"

      - uses: ./.github/actions/setup-bun
        with:
          install-flags: ${{ matrix.settings.bun_install_flags }}

      - name: Azure login
        if: runner.os == 'Windows' && env.HAS_AZURE_SIGNING == 'true'
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm

      - name: Prepare
        run: bun ./scripts/prepare.ts
        working-directory: packages/desktop
        env:
          OPENCODE_VERSION: ${{ needs.version.outputs.version }}
          OPENCODE_CHANNEL: prod
          OPENCODE_RELEASE_OWNER: ${{ github.repository_owner }}
          OPENCODE_RELEASE_REPO: ${{ github.event.repository.name }}
          RUST_TARGET: ${{ matrix.settings.target }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Build
        run: bun run build
        working-directory: packages/desktop
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          OPENCODE_CHANNEL: prod
          OPENCODE_RELEASE_OWNER: ${{ github.repository_owner }}
          OPENCODE_RELEASE_REPO: ${{ github.event.repository.name }}

      - name: Package unsigned macOS
        if: runner.os == 'macOS' && env.HAS_APPLE_CERTIFICATE != 'true'
        run: npx electron-builder ${{ matrix.settings.platform_flag }} --publish never --config electron-builder.config.ts
        working-directory: packages/desktop
        timeout-minutes: 60
        env:
          OPENCODE_CHANNEL: prod
          OPENCODE_RELEASE_OWNER: ${{ github.repository_owner }}
          OPENCODE_RELEASE_REPO: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ github.token }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package
        if: runner.os != 'macOS' || env.HAS_APPLE_CERTIFICATE == 'true'
        run: npx electron-builder ${{ matrix.settings.platform_flag }} --publish never --config electron-builder.config.ts
        working-directory: packages/desktop
        timeout-minutes: 60
        env:
          OPENCODE_CHANNEL: prod
          OPENCODE_RELEASE_OWNER: ${{ github.repository_owner }}
          OPENCODE_RELEASE_REPO: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ github.token }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.HAS_APPLE_CERTIFICATE == 'true' && 'true' || 'false' }}
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ env.HAS_APPLE_API_KEY == 'true' && format('{0}/apple-api-key.p8', runner.temp) || '' }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ env.HAS_AZURE_SIGNING == 'true' && secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME || '' }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ env.HAS_AZURE_SIGNING == 'true' && secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE || '' }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ env.HAS_AZURE_SIGNING == 'true' && secrets.AZURE_TRUSTED_SIGNING_ENDPOINT || '' }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: opencode-plus-desktop-${{ matrix.settings.target }}
          path: packages/desktop/dist/*

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: latest-yml-${{ matrix.settings.target }}
          path: packages/desktop/dist/latest*.yml

  publish-desktop:
    needs:
      - version
      - build-desktop
    if: always() && github.repository != 'anomalyco/opencode' && !failure() && !cancelled()
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - uses: ./.github/actions/setup-bun

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: opencode-plus-desktop-*
          path: /tmp/desktop
          merge-multiple: true

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: latest-yml-*
          path: /tmp/latest-yml

      - name: Upload desktop release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(/tmp/desktop/*.{exe,blockmap,dmg,zip,AppImage,deb,rpm})
          if (( ${#files[@]} == 0 )); then
            echo "No desktop release assets found" >&2
            exit 1
          fi
          gh release upload "${{ needs.version.outputs.tag }}" "${files[@]}" --clobber --repo "${{ needs.version.outputs.repo }}"

      - name: Finalize latest.yml files
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ needs.version.outputs.repo }}
          OPENCODE_VERSION: ${{ needs.version.outputs.version }}
          LATEST_YML_DIR: /tmp/latest-yml
        run: bun ./packages/desktop/scripts/finalize-latest-yml.ts

      - name: Publish release
        if: inputs.publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ needs.version.outputs.tag }}" --draft=false --repo "${{ needs.version.outputs.repo }}"
